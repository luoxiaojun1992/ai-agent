name: CI Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  MIN_COVERAGE: "85"

jobs:
  ui-backend-tests:
    name: UI Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: ui-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run UI backend tests
        run: npm test -- --runInBand

  api-compose-tests:
    name: API Compose Tests
    runs-on: ubuntu-latest
    needs: ui-backend-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run API tests with docker compose
        run: docker compose -f docker-compose.api-test.yml up --build --abort-on-container-exit --exit-code-from api-test-runner

      - name: Show compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.api-test.yml logs

      - name: Tear down compose stack
        if: always()
        run: docker compose -f docker-compose.api-test.yml down -v

  ui-compose-tests:
    name: Frontend UI Tests
    runs-on: ubuntu-latest
    needs: api-compose-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run UI tests with docker compose
        run: docker compose -f docker-compose.ui-test.yml up --build --abort-on-container-exit --exit-code-from ui-test-runner

      - name: Copy UI test artifacts
        if: always()
        run: |
          mkdir -p tests/ui-test-runner/allure-results tests/ui-test-runner/allure-report tests/ui-test-runner/artifacts tests/ui-test-runner/test-results
          ui_runner_id=$(docker compose -f docker-compose.ui-test.yml ps -q ui-test-runner)
          if [ -n "$ui_runner_id" ]; then
            docker cp "$ui_runner_id":/app/allure-results/. tests/ui-test-runner/allure-results/ || true
            docker cp "$ui_runner_id":/app/test-results/. tests/ui-test-runner/test-results/ || true
            docker cp "$ui_runner_id":/app/artifacts/. tests/ui-test-runner/artifacts/ || true
          fi

      - name: Setup Node.js for report generation
        if: always()
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: tests/ui-test-runner/package-lock.json

      - name: Generate Allure report
        if: always()
        run: |
          cd tests/ui-test-runner
          npm ci
          npm run allure:generate

      - name: Upload UI test video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-playwright-videos
          path: tests/ui-test-runner/test-results
          if-no-files-found: warn

      - name: Upload UI screenshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-playwright-screenshots
          path: tests/ui-test-runner/artifacts
          if-no-files-found: warn

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-allure-report
          path: tests/ui-test-runner/allure-report
          if-no-files-found: warn

      - name: Show UI compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.ui-test.yml logs

      - name: Tear down UI compose stack
        if: always()
        run: docker compose -f docker-compose.ui-test.yml down -v

  desktop-compose-tests:
    name: Desktop Client UI Tests
    runs-on: ubuntu-latest
    needs: api-compose-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run desktop tests with docker compose
        run: docker compose -f docker-compose.desktop-test.yml up --build --abort-on-container-exit --exit-code-from desktop-test-runner

      - name: Copy desktop test artifacts
        if: always()
        run: |
          mkdir -p tests/desktop-test-runner/allure-results tests/desktop-test-runner/allure-report tests/desktop-test-runner/artifacts tests/desktop-test-runner/test-results
          desktop_runner_id=$(docker compose -f docker-compose.desktop-test.yml ps -q desktop-test-runner)
          if [ -n "$desktop_runner_id" ]; then
            docker cp "$desktop_runner_id":/app/allure-results/. tests/desktop-test-runner/allure-results/ || true
            docker cp "$desktop_runner_id":/app/test-results/. tests/desktop-test-runner/test-results/ || true
            docker cp "$desktop_runner_id":/app/artifacts/. tests/desktop-test-runner/artifacts/ || true
          fi

      - name: Setup Node.js for desktop report generation
        if: always()
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: tests/desktop-test-runner/package-lock.json

      - name: Generate desktop Allure report
        if: always()
        run: |
          cd tests/desktop-test-runner
          npm ci
          npm run allure:generate

      - name: Upload desktop test video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-playwright-videos
          path: tests/desktop-test-runner/test-results
          if-no-files-found: warn

      - name: Upload desktop screenshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-playwright-screenshots
          path: tests/desktop-test-runner/artifacts
          if-no-files-found: warn

      - name: Upload desktop Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-allure-report
          path: tests/desktop-test-runner/allure-report
          if-no-files-found: warn

      - name: Show desktop compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.desktop-test.yml logs

      - name: Tear down desktop compose stack
        if: always()
        run: docker compose -f docker-compose.desktop-test.yml down -v

  go-root-tests:
    name: Go Root Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run root unit tests (no coverage)
        run: go test ./...

      - name: Run root unit tests (coverage scope)
        run: |
          set -euo pipefail
          pkgs=$(go list ./... | grep -v '/pkg/http$' | grep -v '/pkg/milvus$' | grep -v '/pkg/mcp$' | grep -v '/pkg/ollama$' | grep -v '/util/testutil$')
          coverpkgs=$(echo "$pkgs" | tr '\n' ',' | sed 's/,$//')
          go test $pkgs -coverpkg="$coverpkgs" -coverprofile=coverage.out

      - name: Enforce minimum coverage
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%", "", $3); print $3}')
          echo "Total coverage: ${total}%"
          awk -v total="$total" -v min="$MIN_COVERAGE" 'BEGIN { if (total+0 < min+0) { printf("Coverage %.1f%% is below minimum %.1f%%\n", total, min); exit 1 } }'
