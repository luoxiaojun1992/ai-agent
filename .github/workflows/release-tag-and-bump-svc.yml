name: Release Tag

on:
  workflow_run:
    workflows: ["Unit Tests"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  tag-and-bump:
    if: ${{ github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.head_branch == 'master' || github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ai-agent-svc/go.mod
          cache: true

      - name: Detect root Go project changes
        id: detect_root_changes
        shell: bash
        run: |
          set -euo pipefail

          head_sha="${{ github.event.workflow_run.head_sha }}"
          parent_sha=$(git rev-list --parents -n 1 "$head_sha" | awk '{print $2}')

          if [[ -z "${parent_sha:-}" ]]; then
            changed_files=$(git show --name-only --pretty='' "$head_sha")
          else
            changed_files=$(git diff --name-only "$parent_sha" "$head_sha")
          fi

          echo "Changed files:" 
          echo "$changed_files"

          should_tag=false
          while IFS= read -r file; do
            case "$file" in
              agent.go|checkpoint.go|go.mod|go.sum|pkg/*|skill/*|util/*)
                should_tag=true
                break
                ;;
              *)
                ;;
            esac
          done <<< "$changed_files"

          echo "should_tag=$should_tag" >> "$GITHUB_OUTPUT"

      - name: Skip tag when no root Go project change
        if: ${{ steps.detect_root_changes.outputs.should_tag != 'true' }}
        run: echo "No root Go project changes detected; skip tag creation."

      - name: Create and push next semantic tag
        id: semver_tag
        if: ${{ steps.detect_root_changes.outputs.should_tag == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          latest_tag=$(git tag --list 'v*' --sort=-v:refname | head -n 1)
          if [[ -z "$latest_tag" ]]; then
            latest_tag="v0.0.0"
          fi

          if [[ ! "$latest_tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Latest tag '$latest_tag' is not semver vX.Y.Z"
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"
          next_tag="v${major}.${minor}.$((patch + 1))"

          git tag -a "$next_tag" -m "Release $next_tag"
          git push origin "$next_tag"

          echo "tag=$next_tag" >> "$GITHUB_OUTPUT"

      - name: Update ai-agent-svc dependency and create PR
        if: ${{ steps.detect_root_changes.outputs.should_tag == 'true' && steps.semver_tag.outputs.tag != '' }}
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          next_tag="${{ steps.semver_tag.outputs.tag }}"
          branch_name="chore/bump-ai-agent-${next_tag}"

          # Create a new branch for the update
          git checkout -b "$branch_name"

          # Update go.mod with the new version
          cd ai-agent-svc
          go get "github.com/luoxiaojun1992/ai-agent@${next_tag}"
          go mod tidy
          cd ..

          # Commit and push the changes
          git add ai-agent-svc/go.mod ai-agent-svc/go.sum
          git commit -m "chore: bump ai-agent to ${next_tag}"
          git push origin "$branch_name"

          # Create a pull request using GitHub CLI
          gh pr create \
            --title "chore: bump ai-agent to ${next_tag}" \
            --body "Update ai-agent dependency to ${next_tag}" \
            --base "${{ github.event.workflow_run.head_branch }}" \
            --head "$branch_name"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
