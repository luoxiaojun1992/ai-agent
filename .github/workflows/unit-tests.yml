name: Unit Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  MIN_COVERAGE: "85"

jobs:
  ui-backend-tests:
    name: UI Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: ui-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run UI backend tests
        run: npm test -- --runInBand

  api-compose-tests:
    name: API Compose Tests
    runs-on: ubuntu-latest
    needs: ui-backend-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run API tests with docker compose
        run: docker compose -f docker-compose.api-test.yml up --build --abort-on-container-exit --exit-code-from api-test-runner

      - name: Show compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.api-test.yml logs

      - name: Tear down compose stack
        if: always()
        run: docker compose -f docker-compose.api-test.yml down -v

  go-root-tests:
    name: Go Root Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run root unit tests (no coverage)
        run: go test ./...

      - name: Run root unit tests (coverage scope)
        run: |
          set -euo pipefail
          pkgs=$(go list ./... | grep -v '/pkg/http$' | grep -v '/pkg/milvus$' | grep -v '/pkg/mcp$' | grep -v '/pkg/ollama$' | grep -v '/util/testutil$')
          coverpkgs=$(echo "$pkgs" | tr '\n' ',' | sed 's/,$//')
          go test $pkgs -coverpkg="$coverpkgs" -coverprofile=coverage.out

      - name: Enforce minimum coverage
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%", "", $3); print $3}')
          echo "Total coverage: ${total}%"
          awk -v total="$total" -v min="$MIN_COVERAGE" 'BEGIN { if (total+0 < min+0) { printf("Coverage %.1f%% is below minimum %.1f%%\n", total, min); exit 1 } }'
