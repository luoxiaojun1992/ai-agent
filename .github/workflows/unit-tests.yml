name: Unit Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

env:
  MIN_COVERAGE: "85"

jobs:
  go-root-tests:
    name: Go Root Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run root unit tests
        run: |
          set -euo pipefail
          pkgs=$(go list ./... | grep -v '/pkg/milvus$' | grep -v '/pkg/mcp$' | grep -v '/pkg/ollama$')
          coverpkgs=$(echo "$pkgs" | tr '\n' ',' | sed 's/,$//')
          go test $pkgs -coverpkg="$coverpkgs" -coverprofile=coverage.out

      - name: Enforce minimum coverage
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%", "", $3); print $3}')
          echo "Total coverage: ${total}%"
          awk -v total="$total" -v min="$MIN_COVERAGE" 'BEGIN { if (total+0 < min+0) { printf("Coverage %.1f%% is below minimum %.1f%%\n", total, min); exit 1 } }'
