services:
  mock-ai-agent-svc:
    build:
      context: ./tests/mock/ai-agent-svc-mock
      dockerfile: Dockerfile
    environment:
      - MOCK_AI_AGENT_SVC_PORT=18080
    ports:
      - "18080:18080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:18080/health"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      desktop-test-network:
        aliases:
          - mock-agent-svc

  ui-backend:
    build:
      context: ./ui-backend
      dockerfile: Dockerfile
    environment:
      - PORT=3001
      - CORS_ORIGIN=http://localhost:3000
      - AI_AGENT_SVC_URL=http://host.docker.internal:18080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mock-ai-agent-svc:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      desktop-test-network:
        aliases:
          - ui-backend

  desktop-test-runner:
    build:
      context: ./tests/desktop-test-runner
      dockerfile: Dockerfile
    container_name: desktop-test-runner
    environment:
      - DESKTOP_CLIENT_PATH=/app/desktop-client
    volumes:
      - ./desktop-client:/app/workspace/desktop-client:ro
    command: >
      sh -lc "rm -rf /app/desktop-client &&
      cp -a /app/workspace/desktop-client /app/desktop-client &&
      cd /app/desktop-client &&
      npm ci &&
      cd /app &&
      xvfb-run -a npm test"
    depends_on:
      ui-backend:
        condition: service_healthy
    network_mode: service:ui-backend

networks:
  desktop-test-network:
    driver: bridge
